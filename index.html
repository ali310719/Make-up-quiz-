<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Style Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#e8366a;--plum:#7c2d5e;--cream:#fdf8f4;--ink:#1a0e14;
      --muted:#9e7d8e;--border:#f0d0dc;--green:#1a9e72;--red:#d93025;
      --shadow:0 24px 64px rgba(124,45,94,0.13);
    }
    body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;
      display:flex;align-items:flex-start;justify-content:center;padding:20px;
      position:relative;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 70% 55% at 5% 15%,rgba(232,54,106,0.08) 0%,transparent 55%),
      radial-gradient(ellipse 55% 65% at 95% 85%,rgba(124,45,94,0.07) 0%,transparent 55%);
      pointer-events:none;}
    body::after{content:'✦ ✦ ✦';position:fixed;top:18px;right:24px;
      font-size:9px;letter-spacing:8px;color:rgba(232,54,106,0.2);pointer-events:none;}
    .app{width:100%;max-width:490px;position:relative;z-index:1;padding-bottom:30px;}

    /* Header */
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
    .eyebrow{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
    h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;color:var(--ink);line-height:1.1;}
    h1 em{font-style:italic;color:var(--rose);}
    .counter-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-top:2px;}
    .counter-pill{background:var(--ink);color:#fff;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;}
    .deck-label{font-size:10px;color:var(--muted);font-weight:500;}

    /* Progress */
    .prog-track{width:100%;height:5px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:22px;}
    .prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--rose),var(--plum));border-radius:999px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}

    /* Card */
    .card{background:white;border:1.5px solid var(--border);border-radius:22px;
      padding:24px 22px 22px;box-shadow:var(--shadow);margin-bottom:14px;}
    .card-top{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
      color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:6px;}
    .cat-tag{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;}

    .cat-geyim     {background:#fff3e8;color:#bf5a2a;}
    .cat-ayaqqabi  {background:#f0f8ff;color:#2a6aa0;}
    .cat-aksesuar  {background:#f8e8ff;color:#7a2aaa;}
    .cat-reng      {background:#fff0f8;color:#b03a72;}
    .cat-cekici    {background:#e8fff3;color:#1a7a52;}
    .cat-cekici-deyil{background:#fff0f0;color:#c0392b;}

    .vs-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;}
    .brand-box{background:#fdf8fb;border:1.5px solid var(--border);border-radius:16px;
      padding:18px 12px;text-align:center;transition:all 0.2s;}
    .brand-box.chosen-a{border-color:var(--rose);background:#fce7ef;transform:scale(1.03);}
    .brand-box.chosen-b{border-color:#7c3aed;background:#ede7ff;transform:scale(1.03);}
    .brand-box.chosen-both{border-color:var(--green);background:#e7fff5;transform:scale(1.02);}
    .b-emoji{font-size:28px;margin-bottom:8px;line-height:1;}
    .b-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.2;}
    .b-desc{font-size:11px;color:var(--muted);line-height:1.4;font-weight:500;}
    .vs-div{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--border);text-align:center;flex-shrink:0;}

    /* Buttons */
    .btn{border:none;border-radius:15px;padding:15px 12px;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
      transition:transform 0.15s ease,box-shadow 0.15s ease;
      display:flex;align-items:center;justify-content:center;gap:8px;line-height:1;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,0.13);}
    .btn:active{transform:translateY(0);box-shadow:none;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
    .row1{margin-bottom:10px;}
    .btn-a{background:#fce7ef;color:#c0205a;border:1.5px solid #f5b8ce;}
    .btn-b{background:#ede7ff;color:#5c2daa;border:1.5px solid #c8b0f0;}
    .btn-both{background:#e7fff5;color:#1a7a52;border:1.5px solid #9fe0c4;}
    .btn-neither{background:#f4f4f4;color:#666;border:1.5px solid #ddd;}
    .btn-shuffle{background:white;color:var(--plum);border:1.5px solid var(--border);font-size:13px;}
    .btn-reset{background:var(--plum);color:white;font-size:13px;}
    .btn-next{background:var(--rose);color:white;width:100%;}

    /* Secret comment card */
    .secret-card{background:linear-gradient(145deg,#1a0e14,#3d1a2e);
      border-radius:22px;padding:28px 24px;box-shadow:var(--shadow);margin-bottom:14px;}
    .secret-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
      color:rgba(255,255,255,0.4);margin-bottom:8px;}
    .secret-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
      color:white;margin-bottom:6px;line-height:1.3;}
    .secret-sub{font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:18px;line-height:1.5;}
    .secret-textarea{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
      border-radius:14px;padding:14px 16px;color:white;font-family:'DM Sans',sans-serif;
      font-size:14px;line-height:1.6;resize:none;outline:none;min-height:120px;}
    .secret-textarea::placeholder{color:rgba(255,255,255,0.3);}
    .secret-textarea:focus{border-color:rgba(232,54,106,0.5);}
    .secret-note{font-size:11px;color:rgba(255,255,255,0.25);margin-top:10px;text-align:center;}
    .btn-secret-send{background:var(--rose);color:white;border:none;border-radius:15px;
      padding:15px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;
      font-weight:700;width:100%;margin-top:14px;transition:transform 0.15s,box-shadow 0.15s;}
    .btn-secret-send:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,54,106,0.3);}

    /* Comment toggle button */
    .comment-toggle{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);
      border:1.5px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 16px;
      cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
      color:rgba(255,255,255,0.6);width:100%;margin-top:10px;transition:all 0.2s;}
    .comment-toggle:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);}
    .comment-box{display:none;margin-top:10px;}
    .comment-box.open{display:block;}
    .comment-input{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);
      border-radius:12px;padding:12px 14px;color:white;font-family:'DM Sans',sans-serif;
      font-size:13px;line-height:1.5;resize:none;outline:none;min-height:70px;}
    .comment-input::placeholder{color:rgba(255,255,255,0.3);}
    .comment-input:focus{border-color:rgba(232,54,106,0.4);}

    /* Results */
    .results-panel{background:white;border:1.5px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:16px;}
    .results-header{background:linear-gradient(135deg,var(--rose),var(--plum));color:white;
      padding:14px 18px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}
    .result-item{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid #fdf0f4;font-size:13px;gap:10px;}
    .result-item:last-child{border-bottom:none;}
    .r-cat{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);min-width:72px;}
    .r-choice{font-weight:700;color:var(--ink);flex:1;}
    .r-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;white-space:nowrap;}
    .badge-a{background:#fce7ef;color:#c0205a;}
    .badge-b{background:#ede7ff;color:#5c2daa;}
    .badge-both{background:#e7fff5;color:#1a7a52;}
    .badge-neither{background:#f4f4f4;color:#888;}

    /* End screen */
    .end-screen{display:none;text-align:center;padding:36px 24px;background:white;
      border:1.5px solid var(--border);border-radius:22px;box-shadow:var(--shadow);margin-bottom:16px;}
    .end-screen.show{display:block;animation:slideIn 0.45s cubic-bezier(.4,0,.2,1);}
    .end-emoji{font-size:52px;margin-bottom:14px;}
    .end-title{font-family:'Playfair Display',serif;font-size:25px;font-weight:900;color:var(--ink);margin-bottom:8px;}
    .end-sub{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:18px;}
    .copy-box{background:#fdf8fb;border:1.5px dashed var(--border);border-radius:12px;
      padding:14px 16px;font-size:12px;line-height:1.8;color:var(--ink);text-align:left;
      margin-bottom:14px;max-height:220px;overflow-y:auto;white-space:pre-wrap;}
    .btn-copy{background:var(--rose);color:white;border:none;border-radius:15px;padding:14px 28px;
      font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
      width:100%;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;
      transition:transform 0.15s,box-shadow 0.15s;}
    .btn-copy:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(232,54,106,0.3);}
    .copied-msg{font-size:13px;font-weight:600;color:var(--green);margin-bottom:12px;display:none;}
    .copied-msg.show{display:block;}
    .btn-restart{background:white;color:var(--plum);border:1.5px solid var(--border);border-radius:15px;
      padding:13px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;width:100%;}

    @keyframes slideIn{from{opacity:0;transform:translateX(30px) scale(0.97);}to{opacity:1;transform:translateX(0) scale(1);}}
    @keyframes slideInL{from{opacity:0;transform:translateX(-30px) scale(0.97);}to{opacity:1;transform:translateX(0) scale(1);}}
    .card.anim-r{animation:slideIn 0.38s cubic-bezier(.4,0,.2,1);}
    .card.anim-l{animation:slideInL 0.38s cubic-bezier(.4,0,.2,1);}

    .footer-note{text-align:center;font-size:11.5px;color:var(--muted);letter-spacing:0.3px;margin-top:4px;}
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="eyebrow">Stil Testi</div>
      <h1>Style <em>Quiz</em> ✨</h1>
    </div>
    <div class="counter-wrap">
      <div class="counter-pill" id="counter">1 / 20</div>
      <div class="deck-label">Seç və keç</div>
    </div>
  </div>

  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="card-top">
      <span class="cat-tag" id="catTag">Geyim</span>
      Hansını bəyənirsən?
    </div>
    <div class="vs-row">
      <div class="brand-box" id="boxA">
        <div class="b-emoji" id="emojiA">👗</div>
        <div class="b-name"  id="nameA">A</div>
        <div class="b-desc"  id="descA"></div>
      </div>
      <div class="vs-div">VS</div>
      <div class="brand-box" id="boxB">
        <div class="b-emoji" id="emojiB">👔</div>
        <div class="b-name"  id="nameB">B</div>
        <div class="b-desc"  id="descB"></div>
      </div>
    </div>
  </div>

  <!-- Secret comment (shown on each card, dark style) -->
  <div class="secret-card" id="secretCard" style="display:none;">
    <button class="comment-toggle" onclick="toggleComment()">
      💬 Şərh əlavə et <span style="margin-left:auto;font-size:11px;opacity:0.5;" id="toggleArrow">▼</span>
    </button>
    <div class="comment-box" id="commentBox">
      <textarea class="comment-input" id="commentInput" placeholder="Bu kart haqqında nə düşünürsən? (isteğe bağlı)"></textarea>
    </div>
  </div>

  <!-- End screen -->
  <div class="end-screen" id="endScreen">
    <div class="end-emoji">✨</div>
    <div class="end-title">Bitdi!</div>
    <div class="end-sub" id="endSub"></div>
    <div class="copy-box" id="copyBox"></div>
    <button class="btn-copy" onclick="copyResults()">📋 Kopyala &amp; Göndər</button>
    <div class="copied-msg" id="copiedMsg">✓ Kopyalandı! Göndər 💌</div>
    <button class="btn-restart" onclick="resetGame()">↺ Yenidən Başla</button>
  </div>

  <!-- Controls -->
  <div id="gameControls">
    <div class="row2">
      <button class="btn btn-a" onclick="choose('a')" id="btnA">👍 <span id="lblA">A</span></button>
      <button class="btn btn-b" onclick="choose('b')" id="btnB">👍 <span id="lblB">B</span></button>
    </div>
    <div class="row2" style="margin-bottom:10px">
      <button class="btn btn-both"    onclick="choose('both')">💕 İkisini də</button>
      <button class="btn btn-neither" onclick="choose('neither')">🙅 Heç birini</button>
    </div>
    <div class="row2" style="margin-bottom:16px">
      <button class="btn btn-shuffle" onclick="shuffleCards()">🔀 Qarışdır</button>
      <button class="btn btn-reset"   onclick="resetGame()">↺ Sıfırla</button>
    </div>
  </div>

  <!-- Live results -->
  <div class="results-panel" id="resultsPanel" style="display:none">
    <div class="results-header">✨ Seçimlər</div>
    <div id="resultsList"></div>
  </div>

  <div class="footer-note">Hər kartda 2 seçim — zövqünü kəşf et ✦</div>
</div>

<script>
const CARDS = [
  // ── Geyim stili ──
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"👗", name:"Elegant", desc:"Uzun paltar, klassik kəsim"},
    b:{emoji:"👖", name:"Casual", desc:"Rahat, gündəlik stil"} },
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"🧥", name:"Oversized", desc:"Geniş, rahat, streetwear"},
    b:{emoji:"👘", name:"Fitted", desc:"Bədənə oturan, şık kəsim"} },
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"🖤", name:"Minimalist", desc:"Sadə, tək rəng, clean look"},
    b:{emoji:"🌈", name:"Colorful", desc:"Parlaq rənglər, pattern"} },
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"✨", name:"Glam", desc:"Parlaq, gecəlik, diqqət çəkən"},
    b:{emoji:"🍂", name:"Boho", desc:"Doğal, sərbəst, romantic"} },

  // ── Ayaqqabı ──
  { cat:"Ayaqqabı", cls:"cat-ayaqqabi",
    a:{emoji:"👠", name:"Topuklu", desc:"Stiletto, hündür, klassik"},
    b:{emoji:"👟", name:"Sneaker", desc:"Rahat, idman, casual"} },
  { cat:"Ayaqqabı", cls:"cat-ayaqqabi",
    a:{emoji:"🥿", name:"Loafer", desc:"Elegantlıq + rahatlıq"},
    b:{emoji:"👢", name:"Bot", desc:"Uzun, dəri, güclü görünüş"} },
  { cat:"Ayaqqabı", cls:"cat-ayaqqabi",
    a:{emoji:"🩴", name:"Sandal", desc:"Açıq, yay, minimal"},
    b:{emoji:"🥾", name:"Platform", desc:"Yüksək taban, bold"} },

  // ── Aksesuar ──
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"👜", name:"Mini çanta", desc:"Kiçik, elegant, trend"},
    b:{emoji:"🎒", name:"Tote bag", desc:"Böyük, praktik, casual"} },
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"⌚", name:"Klassik saat", desc:"Qızıl/gümüş, elegantl"},
    b:{emoji:"📿", name:"Zəncir/bilək", desc:"Layer görünüş, streetwear"} },
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"💍", name:"Minimalist üzük", desc:"Nazik, incə, sadə"},
    b:{emoji:"💎", name:"Statement üzük", desc:"Böyük, parlaq, diqqət çəkən"} },
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"🕶", name:"Cat-eye eynək", desc:"Vintage, dramatik, retro"},
    b:{emoji:"😎", name:"Oval eynək", desc:"Müasir, minimal, clean"} },

  // ── Rəng zövqü ──
  { cat:"Rəng", cls:"cat-reng",
    a:{emoji:"🖤", name:"Dark tones", desc:"Qara, tünd, mysterious"},
    b:{emoji:"🤍", name:"Nude tones", desc:"Bej, krem, soft"} },
  { cat:"Rəng", cls:"cat-reng",
    a:{emoji:"🌹", name:"Warm tones", desc:"Qırmızı, narıncı, qızılı"},
    b:{emoji:"💙", name:"Cool tones", desc:"Mavi, yaşıl, gümüşü"} },
  { cat:"Rəng", cls:"cat-reng",
    a:{emoji:"🩷", name:"Pastel", desc:"Açıq çəhrayı, lila, sky blue"},
    b:{emoji:"💜", name:"Bold colors", desc:"Parlaq, saturated, statement"} },

  // ── Özünə çəkici gələn (qadın) ──
  { cat:"Çəkici (özündə)", cls:"cat-cekici",
    a:{emoji:"💄", name:"Makeup ilə", desc:"Tam makiyajlı, hazırlanmış"},
    b:{emoji:"🌿", name:"Natural", desc:"Təbii görünüş, minimal makeup"} },
  { cat:"Çəkici (özündə)", cls:"cat-cekici",
    a:{emoji:"💇", name:"Uzun saç", desc:"Axan, düzlənmiş, romantic"},
    b:{emoji:"✂️", name:"Qısa/orta saç", desc:"Cəsarətli, müasir, bold"} },

  // ── Qarşı cinsdə çəkici gələn ──
  { cat:"Çəkici (kişidə)", cls:"cat-cekici",
    a:{emoji:"🤵", name:"Elegantlıq", desc:"Kostyum, düzgün geyim, şık"},
    b:{emoji:"🧢", name:"Casual cool", desc:"Rahat, streetwear, laid-back"} },
  { cat:"Çəkici (kişidə)", cls:"cat-cekici",
    a:{emoji:"💪", name:"Atletik görünüş", desc:"Fit, aktiv, güclü"},
    b:{emoji:"📚", name:"Intellectual look", desc:"Sakit, düşüncəli, dərin"} },

  // ── Çəkici gəlməyən ──
  { cat:"Sevmədiyi stil", cls:"cat-cekici-deyil",
    a:{emoji:"❌", name:"Çox formal", desc:"Həmişə kostyum, rigidlik"},
    b:{emoji:"❌", name:"Çox rahat", desc:"Həmişə tracksuit, əzginlik"} },
  { cat:"Sevmədiyi stil", cls:"cat-cekici-deyil",
    a:{emoji:"🚫", name:"Çox parlaq", desc:"Hər şey logo, çox rəng"},
    b:{emoji:"🚫", name:"Çox qaranlıq", desc:"Həmişə qara, ağır görünüş"} },
];

let cards = [...CARDS];
let idx = 0;
const answers = [];

function renderCard(dir='right') {
  if (idx >= cards.length) { showEnd(); return; }
  const c = cards[idx];
  document.getElementById('catTag').textContent = c.cat;
  document.getElementById('catTag').className = 'cat-tag ' + c.cls;
  document.getElementById('emojiA').textContent = c.a.emoji;
  document.getElementById('nameA').textContent  = c.a.name;
  document.getElementById('descA').textContent  = c.a.desc;
  document.getElementById('emojiB').textContent = c.b.emoji;
  document.getElementById('nameB').textContent  = c.b.name;
  document.getElementById('descB').textContent  = c.b.desc;
  document.getElementById('lblA').textContent   = c.a.name;
  document.getElementById('lblB').textContent   = c.b.name;
  document.getElementById('counter').textContent = `${idx+1} / ${cards.length}`;
  document.getElementById('progFill').style.width = `${(idx/cards.length)*100}%`;
  document.getElementById('boxA').className = 'brand-box';
  document.getElementById('boxB').className = 'brand-box';
  // Reset comment
  document.getElementById('commentInput').value = '';
  document.getElementById('commentBox').classList.remove('open');
  document.getElementById('toggleArrow').textContent = '▼';
  document.getElementById('secretCard').style.display = 'block';
  const card = document.getElementById('mainCard');
  card.classList.remove('anim-r','anim-l');
  void card.offsetWidth;
  card.classList.add(dir==='right'?'anim-r':'anim-l');
  setTimeout(()=>card.classList.remove('anim-r','anim-l'),420);
}

function toggleComment() {
  const box = document.getElementById('commentBox');
  const arr = document.getElementById('toggleArrow');
  const open = box.classList.toggle('open');
  arr.textContent = open ? '▲' : '▼';
}

function choose(type) {
