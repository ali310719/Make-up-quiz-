const CARDS = [
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"👗", name:"Elegant", desc:"Uzun paltar, klassik kəsim"},
    b:{emoji:"👖", name:"Casual", desc:"Rahat, gündəlik stil"} },
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"🧥", name:"Oversized", desc:"Geniş, rahat, streetwear"},
    b:{emoji:"👘", name:"Fitted", desc:"Bədənə oturan, şık kəsim"} },
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"🖤", name:"Minimalist", desc:"Sadə, tək rəng, clean look"},
    b:{emoji:"🌈", name:"Colorful", desc:"Parlaq rənglər, pattern"} },
  { cat:"Geyim", cls:"cat-geyim",
    a:{emoji:"✨", name:"Glam", desc:"Parlaq, gecəlik, diqqət çəkən"},
    b:{emoji:"🍂", name:"Boho", desc:"Doğal, sərbəst, romantic"} },

  { cat:"Ayaqqabı", cls:"cat-ayaqqabi",
    a:{emoji:"👠", name:"Topuklu", desc:"Stiletto, hündür, klassik"},
    b:{emoji:"👟", name:"Sneaker", desc:"Rahat, idman, casual"} },
  { cat:"Ayaqqabı", cls:"cat-ayaqqabi",
    a:{emoji:"🥿", name:"Loafer", desc:"Elegantlıq + rahatlıq"},
    b:{emoji:"👢", name:"Bot", desc:"Uzun, dəri, güclü görünüş"} },
  { cat:"Ayaqqabı", cls:"cat-ayaqqabi",
    a:{emoji:"🩴", name:"Sandal", desc:"Açıq, yay, minimal"},
    b:{emoji:"🥾", name:"Platform", desc:"Yüksək taban, bold"} },

  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"👜", name:"Mini çanta", desc:"Kiçik, elegant, trend"},
    b:{emoji:"🎒", name:"Tote bag", desc:"Böyük, praktik, casual"} },
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"⌚", name:"Klassik saat", desc:"Qızıl/gümüş, elegantl"},
    b:{emoji:"📿", name:"Zəncir/bilək", desc:"Layer görünüş, streetwear"} },
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"💍", name:"Minimalist üzük", desc:"Nazik, incə, sadə"},
    b:{emoji:"💎", name:"Statement üzük", desc:"Böyük, parlaq, diqqət çəkən"} },
  { cat:"Aksesuar", cls:"cat-aksesuar",
    a:{emoji:"🕶", name:"Cat-eye eynək", desc:"Vintage, dramatik, retro"},
    b:{emoji:"😎", name:"Oval eynək", desc:"Müasir, minimal, clean"} },

  { cat:"Rəng", cls:"cat-reng",
    a:{emoji:"🖤", name:"Dark tones", desc:"Qara, tünd, mysterious"},
    b:{emoji:"🤍", name:"Nude tones", desc:"Bej, krem, soft"} },
  { cat:"Rəng", cls:"cat-reng",
    a:{emoji:"🌹", name:"Warm tones", desc:"Qırmızı, narıncı, qızılı"},
    b:{emoji:"💙", name:"Cool tones", desc:"Mavi, yaşıl, gümüşü"} },
  { cat:"Rəng", cls:"cat-reng",
    a:{emoji:"🩷", name:"Pastel", desc:"Açıq çəhrayı, lila, sky blue"},
    b:{emoji:"💜", name:"Bold colors", desc:"Parlaq, saturated, statement"} },

  { cat:"Çəkici (özündə)", cls:"cat-cekici",
    a:{emoji:"💄", name:"Makeup ilə", desc:"Tam makiyajlı, hazırlanmış"},
    b:{emoji:"🌿", name:"Natural", desc:"Təbii görünüş, minimal makeup"} },
  { cat:"Çəkici (özündə)", cls:"cat-cekici",
    a:{emoji:"💇", name:"Uzun saç", desc:"Axan, düzlənmiş, romantic"},
    b:{emoji:"✂️", name:"Qısa/orta saç", desc:"Cəsarətli, müasir, bold"} },

  { cat:"Çəkici (kişidə)", cls:"cat-cekici",
    a:{emoji:"🤵", name:"Elegantlıq", desc:"Kostyum, düzgün geyim, şık"},
    b:{emoji:"🧢", name:"Casual cool", desc:"Rahat, streetwear, laid-back"} },
  { cat:"Çəkici (kişidə)", cls:"cat-cekici",
    a:{emoji:"💪", name:"Atletik görünüş", desc:"Fit, aktiv, güclü"},
    b:{emoji:"📚", name:"Intellectual look", desc:"Sakit, düşüncəli, dərin"} },

  { cat:"Sevmədiyi stil", cls:"cat-cekici-deyil",
    a:{emoji:"❌", name:"Çox formal", desc:"Həmişə kostyum, rigidlik"},
    b:{emoji:"❌", name:"Çox rahat", desc:"Həmişə tracksuit, əzginlik"} },
  { cat:"Sevmədiyi stil", cls:"cat-cekici-deyil",
    a:{emoji:"🚫", name:"Çox parlaq", desc:"Hər şey logo, çox rəng"},
    b:{emoji:"🚫", name:"Çox qaranlıq", desc:"Həmişə qara, ağır görünüş"} },
];

let cards = [...CARDS];
let idx = 0;
let answers = [];

function renderCard(dir = 'right') {
  if (idx >= cards.length) {
    showEnd();
    return;
  }

  const c = cards[idx];
  document.getElementById('catTag').textContent = c.cat;
  document.getElementById('catTag').className = 'cat-tag ' + c.cls;

  document.getElementById('emojiA').textContent = c.a.emoji;
  document.getElementById('nameA').textContent = c.a.name;
  document.getElementById('descA').textContent = c.a.desc;

  document.getElementById('emojiB').textContent = c.b.emoji;
  document.getElementById('nameB').textContent = c.b.name;
  document.getElementById('descB').textContent = c.b.desc;

  document.getElementById('lblA').textContent = c.a.name;
  document.getElementById('lblB').textContent = c.b.name;

  document.getElementById('counter').textContent = `${idx + 1} / ${cards.length}`;
  document.getElementById('progFill').style.width = `${(idx / cards.length) * 100}%`;

  document.getElementById('boxA').className = 'brand-box';
  document.getElementById('boxB').className = 'brand-box';

  document.getElementById('commentInput').value = '';
  document.getElementById('commentBox').classList.remove('open');
  document.getElementById('toggleArrow').textContent = '▼';
  document.getElementById('secretCard').style.display = 'block';

  const card = document.getElementById('mainCard');
  card.classList.remove('anim-r', 'anim-l');
  void card.offsetWidth;
  card.classList.add(dir === 'right' ? 'anim-r' : 'anim-l');
  setTimeout(() => card.classList.remove('anim-r', 'anim-l'), 420);
}

function toggleComment() {
  const box = document.getElementById('commentBox');
  const arrow = document.getElementById('toggleArrow');
  const open = box.classList.toggle('open');
  arrow.textContent = open ? '▲' : '▼';
}

function choose(type) {
  const c = cards[idx];
  const comment = document.getElementById('commentInput').value.trim();

  let label = '';
  let emoji = '';

  document.getElementById('boxA').className = 'brand-box';
  document.getElementById('boxB').className = 'brand-box';

  if (type === 'a') {
    label = c.a.name;
    emoji = '👍';
    document.getElementById('boxA').className = 'brand-box chosen-a';
  } else if (type === 'b') {
    label = c.b.name;
    emoji = '👍';
    document.getElementById('boxB').className = 'brand-box chosen-b';
  } else if (type === 'both') {
    label = `${c.a.name} & ${c.b.name}`;
    emoji = '💕';
    document.getElementById('boxA').className = 'brand-box chosen-both';
    document.getElementById('boxB').className = 'brand-box chosen-both';
  } else {
    label = 'Heç biri';
    emoji = '🙅';
  }

  answers.push({
    category: c.cat,
    choice: label,
    type,
    emoji,
    comment
  });

  updateResults();

  setTimeout(() => {
    idx++;
    renderCard('right');
  }, 260);
}

function updateResults() {
  const panel = document.getElementById('resultsPanel');
  const list = document.getElementById('resultsList');

  if (answers.length === 0) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  list.innerHTML = '';

  answers.forEach(item => {
    const row = document.createElement('div');
    row.className = 'result-item';

    let badgeClass = 'badge-neither';
    if (item.type === 'a') badgeClass = 'badge-a';
    else if (item.type === 'b') badgeClass = 'badge-b';
    else if (item.type === 'both') badgeClass = 'badge-both';

    row.innerHTML = `
      <div class="r-cat">${item.category}</div>
      <div class="r-choice">${item.emoji} ${item.choice}${item.comment ? `<br><span style="font-size:11px;color:#9e7d8e;font-weight:500;">"${escapeHtml(item.comment)}"</span>` : ''}</div>
      <div class="r-badge ${badgeClass}">${getTypeLabel(item.type)}</div>
    `;

    list.appendChild(row);
  });
}

function getTypeLabel(type) {
  if (type === 'a') return 'A';
  if (type === 'b') return 'B';
  if (type === 'both') return 'İkisi';
  return 'Heç biri';
}

function showEnd() {
  document.getElementById('mainCard').style.display = 'none';
  document.getElementById('secretCard').style.display = 'none';
  document.getElementById('gameControls').style.display = 'none';
  document.getElementById('resultsPanel').style.display = 'none';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('counter').textContent = `${cards.length} / ${cards.length}`;

  const endScreen = document.getElementById('endScreen');
  endScreen.classList.add('show');

  const commentCount = answers.filter(a => a.comment).length;
  document.getElementById('endSub').textContent =
    `Toplam ${answers.length} seçim edildi${commentCount ? ` və ${commentCount} şərh yazıldı` : ''}. Aşağıdakı mətni kopyalayıb göndərə bilərsən.`;

  document.getElementById('copyBox').textContent = buildCopyText();
}

function buildCopyText() {
  let text = `Style Quiz nəticələrim ✨\n\n`;

  answers.forEach((item, i) => {
    text += `${i + 1}. ${item.category}: ${item.choice}`;
    if (item.comment) {
      text += `\n   Şərh: ${item.comment}`;
    }
    text += `\n`;
  });

  return text.trim();
}

async function copyResults() {
  const text = document.getElementById('copyBox').textContent;
  const copiedMsg = document.getElementById('copiedMsg');

  try {
    await navigator.clipboard.writeText(text);
    copiedMsg.classList.add('show');
    setTimeout(() => copiedMsg.classList.remove('show'), 2200);
  } catch (e) {
    fallbackCopy(text);
    copiedMsg.classList.add('show');
    setTimeout(() => copiedMsg.classList.remove('show'), 2200);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

function shuffleCards() {
  cards = [...cards].sort(() => Math.random() - 0.5);
  idx = 0;
  answers = [];
  resetUIOnly();
  renderCard('left');
}

function resetGame() {
  cards = [...CARDS];
  idx = 0;
  answers = [];
  resetUIOnly();
  renderCard('left');
}

function resetUIOnly() {
  document.getElementById('mainCard').style.display = 'block';
  document.getElementById('secretCard').style.display = 'block';
  document.getElementById('gameControls').style.display = 'block';
  document.getElementById('resultsPanel').style.display = 'none';
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('copiedMsg').classList.remove('show');
  document.getElementById('copyBox').textContent = '';
  document.getElementById('resultsList').innerHTML = '';
  document.getElementById('progFill').style.width = '0%';
}

function escapeHtml(str) {
  return str
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

renderCard();
</script>
